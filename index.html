<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calacalí Experience PRO</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
overflow:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:100;
}
#intro h1{
font-size:8vw;
letter-spacing:10px;
animation:fade 2s ease;
}
@keyframes fade{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* MAPA LISTA */
#mapa{
display:none;
height:100vh;
overflow:auto;
padding:40px;
background:#111;
}

.card{
background:#1e1e1e;
padding:20px;
margin:15px 0;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}
.card:hover{
background:#292929;
transform:translateY(-4px);
}

/* VISTA PRO */
#vista{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:none;
flex-direction:column;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.overlay{
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
}

.tab{
padding:12px 30px;
border-radius:30px;
background:#222;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.tab.active{
background:crimson;
}

.content{
flex:1;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.content iframe{
width:90%;
height:90%;
border-radius:15px;
border:none;
box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.volver{
position:absolute;
top:20px;
right:30px;
background:crimson;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

@media(max-width:768px){
.content iframe{
width:100%;
height:80%;
}
}
</style>
</head>

<body>

<div id="intro">
<h1>CALACALÍ</h1>
</div>

<div id="mapa">

<h2>Selecciona un lugar</h2>

<div class="card" onclick="abrirLugar(
'Museo Casa Carlota Jaramillo',
'https://maps.google.com/?q=Museo+Casa+Carlota+Jaramillo+Calacalí&output=embed',
'https://www.facebook.com/CasaCarlotaJaramillo/',
'https://upload.wikimedia.org/wikipedia/commons/6/6b/Exterior_Casa_Museo_Carlota_Jaramillo.jpg'
)">
Museo Casa Carlota Jaramillo
</div>

<div class="card" onclick="abrirLugar(
'Monumento Mitad del Mundo',
'https://maps.google.com/?q=Monumento+Mitad+del+Mundo+Calacalí&output=embed',
'https://www.instagram.com/explore/locations/236311290/monumento-a-la-mitad-del-mundo-calacalali/',
'https://upload.wikimedia.org/wikipedia/commons/0/05/Mitad_del_Mundo%2C_Quito%2C_Ecuador%2C_2015-07-22%2C_DD_15.JPG'
)">
Monumento Mitad del Mundo
</div>

</div>

<div id="vista">
<div class="overlay">

<button class="volver" onclick="volver()">Volver</button>

<div class="topbar">
<div class="tab active" id="tabMapa" onclick="mostrarMapa()">📍 Ubicación</div>
<div class="tab" id="tabInfo" onclick="mostrarInfo()">ℹ Información</div>
</div>

<div class="content">
<iframe id="contenido"></iframe>
</div>

</div>
</div>

<script>
const intro=document.getElementById("intro");
const mapa=document.getElementById("mapa");
const vista=document.getElementById("vista");
const contenido=document.getElementById("contenido");
const tabMapa=document.getElementById("tabMapa");
const tabInfo=document.getElementById("tabInfo");

let mapaURL="";
let infoURL="";
let bgImage="";

intro.onclick=()=>{
intro.style.display="none";
mapa.style.display="block";
}

function abrirLugar(nombre,map,info,img){
mapaURL=map;
infoURL=info;
bgImage=img;

vista.style.backgroundImage="url('"+bgImage+"')";
mapa.style.display="none";
vista.style.display="flex";

mostrarMapa();
}

function mostrarMapa(){
contenido.src=mapaURL;
tabMapa.classList.add("active");
tabInfo.classList.remove("active");
}

function mostrarInfo(){
contenido.src=infoURL;
tabInfo.classList.add("active");
tabMapa.classList.remove("active");
}

function volver(){
vista.style.display="none";
mapa.style.display="block";
}
</script>

</body>
</html>
