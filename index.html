<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calacalí Experience PRO</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
overflow:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:100;
}
#intro h1{
font-size:8vw;
letter-spacing:10px;
animation:fade 2s ease;
}
@keyframes fade{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* MAPA */
#mapa{
display:none;
height:100vh;
overflow:auto;
padding:40px;
box-sizing:border-box;
background:#111;
}

.card{
background:#1c1c1c;
padding:20px;
margin:15px 0;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}
.card:hover{
background:#2a2a2a;
transform:scale(1.02);
}

/* VISTA */
#vista{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;
display:none;
flex-direction:column;
}

.topbar{
display:flex;
background:#111;
padding:10px;
gap:10px;
}

.tab{
padding:10px 20px;
background:#222;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.tab.active{
background:crimson;
}

#panel{
flex:1;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.volver{
position:absolute;
top:15px;
right:20px;
background:crimson;
border:none;
padding:8px 15px;
cursor:pointer;
border-radius:5px;
z-index:10;
}

@media(max-width:768px){
#intro h1{
font-size:12vw;
}
}
</style>
</head>

<body>

<div id="intro">
<h1>CALACALÍ</h1>
</div>

<div id="mapa">

<h2>Selecciona un lugar</h2>

<div class="card" onclick="abrirLugar(
'Museo Casa Carlota Jaramillo',
'https://maps.google.com/?q=Museo+Casa+Carlota+Jaramillo+Calacalí&output=embed',
'https://www.facebook.com/CasaCarlotaJaramillo/'
)">
Museo Casa Carlota Jaramillo
</div>

<div class="card" onclick="abrirLugar(
'Monumento Mitad del Mundo',
'https://maps.google.com/?q=Monumento+Mitad+del+Mundo+Calacalí&output=embed',
'https://www.instagram.com/explore/locations/236311290/monumento-a-la-mitad-del-mundo-calacalí/'
)">
Monumento Mitad del Mundo
</div>

<div class="card" onclick="abrirLugar(
'El Patio',
'https://maps.google.com/?q=El+Patio+Organic+Traditional+Food+Calacalí&output=embed',
'https://www.facebook.com/elpatioecorestaurante'
)">
El Patio Restaurante
</div>

</div>

<div id="vista">

<div class="topbar">
<div class="tab active" id="tabMapa" onclick="mostrarMapa()">Ubicación</div>
<div class="tab" id="tabInfo" onclick="mostrarInfo()">Información</div>
</div>

<div id="panel">
<button class="volver" onclick="volver()">Volver</button>
<iframe id="contenido"></iframe>
</div>

</div>

<script>
const intro=document.getElementById("intro");
const mapa=document.getElementById("mapa");
const vista=document.getElementById("vista");
const contenido=document.getElementById("contenido");
const tabMapa=document.getElementById("tabMapa");
const tabInfo=document.getElementById("tabInfo");

let mapaURL="";
let infoURL="";

intro.onclick=()=>{
intro.style.display="none";
mapa.style.display="block";
}

function abrirLugar(nombre,mapURL,infoURLparam){
mapaURL=mapURL;
infoURL=infoURLparam;
mapa.style.display="none";
vista.style.display="flex";
mostrarMapa();
}

function mostrarMapa(){
contenido.src=mapaURL;
tabMapa.classList.add("active");
tabInfo.classList.remove("active");
}

function mostrarInfo(){
contenido.src=infoURL;
tabInfo.classList.add("active");
tabMapa.classList.remove("active");
}

function volver(){
vista.style.display="none";
mapa.style.display="block";
}
</script>

</body>
</html>
