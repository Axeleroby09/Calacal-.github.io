<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomasqui</title>

<style>

/* =====================
   RESET
===================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* =====================
   PANTALLA INICIAL
===================== */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
}

#intro h1{
    font-size:8vw;
    letter-spacing:10px;
    transition:0.5s;
}

#intro:hover h1{
    transform:scale(1.1);
    color:#e50914;
}

/* =====================
   MAPA PRINCIPAL
===================== */
#mapaPrincipal{
    display:none;
    padding:60px 5%;
}

#mapaPrincipal h2{
    margin-bottom:30px;
    font-size:28px;
}

.lugares-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.lugar-card{
    background:#1a1a1a;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.lugar-card:hover{
    transform:translateY(-8px);
}

.lugar-img{
    background:white;
    height:180px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:black;
    font-weight:bold;
    text-align:center;
    padding:10px;
}

.lugar-info{
    padding:20px;
}

/* =====================
   DETALLE LUGAR
===================== */
.detalle-lugar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#0f0f0f;
    padding:40px 5%;
    display:none;
    z-index:2000;
}

.btn-volver{
    background:#e50914;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;
}

.detalle-container{
    display:flex;
    gap:30px;
    height:75vh;
}

.panel{
    flex:1;
    background:#111;
    border-radius:15px;
    overflow:hidden;
    padding:20px;
}

.mapa-panel iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:10px;
}

.info-panel h2{
    margin-bottom:15px;
}

.info-box{
    margin-top:20px;
    background:#1f1f1f;
    padding:15px;
    border-radius:10px;
}

/* =====================
   RESPONSIVE
===================== */
@media(max-width:900px){
    .detalle-container{
        flex-direction:column;
        height:auto;
    }
    .panel{
        height:400px;
    }
}

</style>
</head>
<body>

<!-- =====================
     INTRO
===================== -->
<div id="intro" onclick="entrarMapa()">
    <h1>POMASQUI</h1>
</div>

<!-- =====================
     MAPA PRINCIPAL
===================== -->
<section id="mapaPrincipal">
    <h2>Selecciona un lugar</h2>

    <div class="lugares-grid">

        <!-- EJEMPLO 1 -->
        <div class="lugar-card" onclick="abrirLugar(
            'Lugar Turístico Ejemplo',
            'Descripción de ejemplo lista para reemplazar por información real.',
            -0.0022,
            -78.4300
        )">
            <div class="lugar-img">
                Imagen Turistico 1
            </div>
            <div class="lugar-info">
                <h3>Lugar Turístico Ejemplo</h3>
                <p>Turismo</p>
            </div>
        </div>

        <!-- EJEMPLO 2 -->
        <div class="lugar-card" onclick="abrirLugar(
            'Restaurante Ejemplo',
            'Información del restaurante de ejemplo.',
            -0.0102,
            -78.4230
        )">
            <div class="lugar-img">
                Imagen Comida 1
            </div>
            <div class="lugar-info">
                <h3>Restaurante Ejemplo</h3>
                <p>Comida</p>
            </div>
        </div>

        <!-- EJEMPLO 3 -->
        <div class="lugar-card" onclick="abrirLugar(
            'Artesanía Ejemplo',
            'Descripción de artesanías lista para editar.',
            -0.0150,
            -78.4350
        )">
            <div class="lugar-img">
                Imagen Artesanía 1
            </div>
            <div class="lugar-info">
                <h3>Artesanía Ejemplo</h3>
                <p>Artesanía</p>
            </div>
        </div>

    </div>
</section>

<!-- =====================
     DETALLE LUGAR
===================== -->
<section id="detalleLugar" class="detalle-lugar">

    <button class="btn-volver" onclick="cerrarLugar()">← Volver</button>

    <div class="detalle-container">

        <div class="panel mapa-panel">
            <iframe id="mapaFrame" src=""></iframe>
        </div>

        <div class="panel info-panel">
            <h2 id="tituloLugar">Nombre del Lugar</h2>
            <p id="descripcionLugar"></p>

            <div class="info-box">
                <h4>Horario</h4>
                <p>09:00 - 18:00</p>
            </div>

            <div class="info-box">
                <h4>Contacto</h4>
                <p>099 999 9999</p>
            </div>

        </div>

    </div>

</section>

<script>

/* ENTRAR AL MAPA */
function entrarMapa(){
    document.getElementById("intro").style.display="none";
    document.getElementById("mapaPrincipal").style.display="block";
}

/* ABRIR LUGAR */
function abrirLugar(nombre, descripcion, lat, lng){

    document.getElementById("detalleLugar").style.display="block";

    document.getElementById("tituloLugar").innerText=nombre;
    document.getElementById("descripcionLugar").innerText=descripcion;

    const mapaURL=`https://www.google.com/maps?q=${lat},${lng}&output=embed`;
    document.getElementById("mapaFrame").src=mapaURL;
}

/* CERRAR */
function cerrarLugar(){
    document.getElementById("detalleLugar").style.display="none";
}

</script>

</body>
</html>
