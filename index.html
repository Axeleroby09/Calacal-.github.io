<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomasqui</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
cursor:pointer;
}

#intro h1{
font-size:8vw;
letter-spacing:10px;
transition:0.4s;
}

#intro:hover h1{
transform:scale(1.1);
color:#e50914;
}

/* SECCION PRINCIPAL */
#mapaPrincipal{
display:none;
padding:80px 5%;
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
}

.categoria{
margin-bottom:70px;
}

.categoria h2{
font-size:28px;
margin-bottom:25px;
border-left:5px solid #e50914;
padding-left:15px;
}

.lugares-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.lugar-card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.lugar-card:hover{
transform:translateY(-10px);
}

.lugar-img img{
width:100%;
height:200px;
object-fit:cover;
}

.lugar-info{
padding:20px;
}

/* DETALLE */
.detalle-lugar{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#0f0f0f;
padding:40px 5%;
display:none;
z-index:2000;
}

.btn-volver{
background:#e50914;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
}

.detalle-container{
display:flex;
gap:30px;
height:80vh;
}

.panel{
flex:1;
background:#111;
border-radius:15px;
overflow:hidden;
padding:20px;
display:flex;
flex-direction:column;
}

.mapa-panel iframe{
width:100%;
height:100%;
border:none;
border-radius:10px;
}

.info-panel h2{
margin-bottom:15px;
}

.info-panel p{
color:#ccc;
margin-bottom:20px;
}

.btn-social{
margin-top:20px;
background:#e50914;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.btn-social:hover{
background:#ff1f2e;
}

@media(max-width:900px){
.detalle-container{
flex-direction:column;
height:auto;
}
.panel{
height:400px;
}
}

</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" onclick="entrarMapa()">
<h1>POMASQUI</h1>
</div>

<section id="mapaPrincipal">

<!-- TURISMO -->
<div class="categoria">
<h2>Turismo</h2>
<div class="lugares-grid">

<div class="lugar-card" onclick="abrirLugar('Museo Casa Carlota Jaramillo','Museo dedicado a la Reina del Pasillo.',-0.0022,-78.4300,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Casa_Carlota_Jaramillo.jpg">
</div>
<div class="lugar-info"><h3>Museo Casa Carlota Jaramillo</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Monumento Mitad del Mundo','Lugar emblemático del Ecuador.',-0.0021,-78.4558,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Mitad_del_Mundo_Quito_Ecuador.jpg">
</div>
<div class="lugar-info"><h3>Mitad del Mundo</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Parque Central','Espacio recreativo local.',-0.0040,-78.4320,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Parque_Quito.jpg">
</div>
<div class="lugar-info"><h3>Parque Central</h3></div>
</div>

</div>
</div>

<!-- GASTRONOMÍA -->
<div class="categoria">
<h2>Gastronomía</h2>
<div class="lugares-grid">

<div class="lugar-card" onclick="abrirLugar('Restaurante Ejemplo','Comida típica ecuatoriana.',-0.0102,-78.4230,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Locro_de_papa.jpg">
</div>
<div class="lugar-info"><h3>Restaurante 1</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Asadero Ejemplo','Especialidad en carnes.',-0.0110,-78.4250,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/32/Carne_asada.jpg">
</div>
<div class="lugar-info"><h3>Restaurante 2</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Cafetería Ejemplo','Café artesanal y postres.',-0.0120,-78.4260,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Coffee.jpg">
</div>
<div class="lugar-info"><h3>Cafetería</h3></div>
</div>

</div>
</div>

<!-- ARTESANÍAS -->
<div class="categoria">
<h2>Artesanías</h2>
<div class="lugares-grid">

<div class="lugar-card" onclick="abrirLugar('Artesanía 1','Productos hechos a mano.',-0.0150,-78.4350,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Artesania.jpg">
</div>
<div class="lugar-info"><h3>Artesanía 1</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Artesanía 2','Recuerdos y cultura local.',-0.0160,-78.4360,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/85/Handicraft.jpg">
</div>
<div class="lugar-info"><h3>Artesanía 2</h3></div>
</div>

<div class="lugar-card" onclick="abrirLugar('Artesanía 3','Productos culturales.',-0.0170,-78.4370,'https://www.instagram.com')">
<div class="lugar-img">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Handmade.jpg">
</div>
<div class="lugar-info"><h3>Artesanía 3</h3></div>
</div>

</div>
</div>

</section>

<section id="detalleLugar" class="detalle-lugar">

<button class="btn-volver" onclick="cerrarLugar()">← Volver</button>

<div class="detalle-container">

<div class="panel mapa-panel">
<iframe id="mapaFrame" src=""></iframe>
</div>

<div class="panel info-panel">
<h2 id="tituloLugar"></h2>
<p id="descripcionLugar"></p>
<a id="socialLink" href="#" target="_blank" class="btn-social">
Visitar Instagram / Sitio Web
</a>
</div>

</div>

</section>

<script>

function entrarMapa(){
document.getElementById("intro").style.display="none";
document.getElementById("mapaPrincipal").style.display="block";
}

function abrirLugar(nombre, descripcion, lat, lng, link){
document.getElementById("detalleLugar").style.display="block";
document.getElementById("tituloLugar").innerText=nombre;
document.getElementById("descripcionLugar").innerText=descripcion;
document.getElementById("mapaFrame").src=`https://www.google.com/maps?q=${lat},${lng}&output=embed`;
document.getElementById("socialLink").href=link;
}

function cerrarLugar(){
document.getElementById("detalleLugar").style.display="none";
}

</script>

</body>
</html>
